<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema integrado Posigraf — RH, DHO e Serviços Gerais (protótipo)." />
  <title>Posigraf — Sistema integrado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#0d9488',
              foreground: '#ffffff',
            },
            secondary: {
              DEFAULT: '#1E293B', // Slate 800
              foreground: '#ffffff',
            },
            success: '#16A34A',
            warning: '#F59E0B',
            danger: '#DC2626',
            border: '#E2E8F0',
            card: {
              DEFAULT: '#ffffff',
              foreground: '#0f172a',
            },
            background: '#F8FAFC',
            muted: {
              DEFAULT: '#f1f5f9',
              foreground: '#64748b',
            },
            accent: {
              DEFAULT: '#f1f5f9',
              foreground: '#0f172a',
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 224 71.4% 4.1%;
      --card: 0 0% 100%;
      --card-foreground: 224 71.4% 4.1%;
      --popover: 0 0% 100%;
      --popover-foreground: 224 71.4% 4.1%;
      --primary: 173 58% 39%;
      --primary-foreground: 210 20% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222.2 47.4% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222.2 47.4% 11.2%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 20% 98%;
      --border: 214.3 31.8% 91.4%;
      --input: 214.3 31.8% 91.4%;
      --ring: 173 58% 39%;
      --radius: 0.75rem;
    }

      body {
        background-color: #F8FAFC;
        margin: 0;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        color: #1E293B;
        /* Premium Background Gradient (Subtle) */
        background-image: radial-gradient(at 0% 0%, hsla(217,100%,70%,0.03) 0, transparent 40%), 
                          radial-gradient(at 100% 0%, hsla(217,39%,50%,0.03) 0, transparent 40%);
      }

      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #e2e8f0;
        border-radius: 9999px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #cbd5e1;
      }

      /* Premium SaaS Utilities */
      .glass-card {
        background-color: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      }
      
      .text-balance {
        text-wrap: balance;
      }

  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
